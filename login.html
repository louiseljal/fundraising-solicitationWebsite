<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Community Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center py-5">

    <div class="form-check form-switch theme-switch-wrapper">
        <input class="form-check-input cursor-pointer theme-switch-input" type="checkbox" id="darkModeToggle">
        <label class="form-check-label small fw-semibold ms-2 user-select-none theme-switch-label" for="darkModeToggle">
            Dark Mode
        </label>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                
                <div class="stat-card">
                    
                    <div class="identity-banner">
                        <div class="d-inline-flex align-items-center justify-content-center mb-2 app-icon-badge">
                            <i class="fa-solid fa-users"></i>
                        </div>
                        <h4 class="fw-bold mb-1">Community Management</h4>
                        <p class="small text-white-50 mb-0 opacity-75">Together, we build a better community.</p>
                    </div>

                    <div class="p-4 p-sm-5 login-content-panel">
                        
                        <div class="mb-4">
                            <h5 class="fw-bold mb-1">Account Sign In</h5>
                            <p class="text-muted small">Please input your dashboard credentials below</p>
                        </div>

                        <form action="login_process.php" method="POST">
                            
                            <div class="mb-3">
                                <label for="username" class="form-label small fw-semibold">Username or Email</label>
                                <div class="input-group">
                                    <span class="input-group-text dynamic-input-addon"><i class="fa-solid fa-envelope"></i></span>
                                    <input type="text" name="username" id="username" class="form-control form-control-lg dynamic-input-bg fs-6" placeholder="Enter username" required autocomplete="username">
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <label for="password" class="form-label small fw-semibold mb-0">Password</label>
                                    <a href="#" class="small text-decoration-none text-brand-color fw-semibold">Forgot?</a>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text dynamic-input-addon"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" name="password" id="password" class="form-control form-control-lg dynamic-input-bg fs-6" placeholder="••••••••" required autocomplete="current-password">
                                </div>
                            </div>

                            <div class="form-check mb-4 d-flex align-items-center">
                                <input class="form-check-input cursor-pointer text-success remember-me-checkbox" type="checkbox" id="rememberMe" name="remember_me">
                                <label class="form-check-label small text-muted cursor-pointer user-select-none ms-2" for="rememberMe">
                                    Keep me logged in on this machine
                                </label>
                            </div>

                            <button type="submit" class="btn btn-brand w-100 btn-lg rounded-3 mb-2">
                                Sign In <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                            </button>
                        </form>

                        <div class="text-center mt-4 pt-3 border-top login-footer-separator">
                            <p class="small text-muted mb-0">Need a system account? 
                                <a href="#" class="fw-semibold text-decoration-none text-brand-color">Contact Admin</a>
                            </p>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
